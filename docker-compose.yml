version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "5030:5030"
    env_file:
      - ./backend/.env
    environment:
      # Hardcoded — menang atas nilai apapun di .env
      BACKEND_CORS_ORIGINS: "*"
      # Pastikan semua datetime di Python pakai WIB
      TZ: "Asia/Jakarta"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 5030 --timeout-keep-alive 75

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "5020:80"
    environment:
      # Timezone container Nginx/frontend juga WIB (untuk log server)
      TZ: "Asia/Jakarta"
    restart: always

volumes: {}
